<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Marquee — Movie Search</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Inter:wght@400;500;600;700&family=Inter:ital@1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <div class="brand-row">
    <img class="brand-logo" src="images/movie logo.png" alt="Movie Search" />
    <p class="tagline">Now showing: anything you search for</p>
  </div>

  <div class="search-wrap">
    <div class="search-field">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input type="text" id="searchInput" placeholder="Search for a film — e.g. Heat, Amélie, Spirited Away…" autocomplete="off" />
    </div>
    <button class="search-go" id="searchBtn">Search</button>
  </div>

  <div class="controls-row">
    <span class="sort-label">Sort by rating</span>
    <div class="slider-track-wrap">
      <input type="range" id="ratingSlider" min="0" max="10" step="0.1" value="0" />
    </div>
    <span class="slider-value" id="sliderValue">Any ≥ 0.0</span>
    <button class="sort-dir-btn" id="sortDirBtn" title="Toggle sort direction">
      <svg id="sortDirIcon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 6h18M7 12h10M11 18h2"></path>
      </svg>
      <span id="sortDirText">Highest first</span>
    </button>
  </div>
</header>

<main>
  <p class="status-line" id="statusLine"></p>
  <div class="grid" id="grid">
    <div class="empty-state">
      <span class="big">The house lights are up.</span>
      Search for a title above to start the screening.
    </div>
  </div>
</main>

<script src="app.js"></script>
</body>
</html>
